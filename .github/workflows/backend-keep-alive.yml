name: Frontend Keep-Alive Ping

on:
  schedule:
    # Run every 3 minutes from frontend deployment
    - cron: '*/3 * * * *'
  workflow_dispatch:

jobs:
  wake-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up backend from frontend
        run: |
          echo "Attempting to wake backend..."
          for endpoint in "health" "api/properties?limit=1" "api/locations"; do
            url="https://property-sales-api.onrender.com/$endpoint"
            echo "Pinging: $url"
            curl -s -m 10 "$url" > /dev/null 2>&1 &
          done
          wait
          echo "Wake-up attempt completed"
